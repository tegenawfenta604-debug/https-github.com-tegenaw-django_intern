{% extends "base.html" %}
{% block title %}Login — Django Intern Blog{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-6 mx-auto">
    <h1 class="mb-4"><i class="fa-solid fa-right-to-bracket"></i> Login</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="mt-3">No account? <a href="{% url 'register' %}">Register here</a>.</p>
    <p><a href="{% url 'password_reset' %}">Forgot password?</a></p>
  </div>
</div>
{% endblock %}
