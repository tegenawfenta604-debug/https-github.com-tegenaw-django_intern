{% extends "base.html" %}
{% block title %}Register — Django Intern Blog{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-6 mx-auto">
    <h1 class="mb-4"><i class="fa-solid fa-user-plus"></i> Create Account</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
  </div>
</div>
{% endblock %}
