{% extends "base.html" %}
{% block title %}Edit Profile — Django Intern Blog{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-8 mx-auto">
    <h1 class="mb-4"><i class="fa-solid fa-user-pen"></i> Edit Profile</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
</div>
{% endblock %}
