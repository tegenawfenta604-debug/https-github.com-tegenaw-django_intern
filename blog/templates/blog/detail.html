{% extends 'blog/base.html' %}

{% block title %}{{ blog.title }} — My Blog{% endblock %}

{% block content %}
<article class="bg-white rounded-lg border border-gray-200 p-8">
    <h1 class="text-3xl font-bold text-gray-900">{{ blog.title }}</h1>
    <p class="text-sm text-gray-500 mt-2">{{ blog.created_at|date:"F j, Y" }}</p>
    <div class="mt-6 text-gray-700 leading-relaxed whitespace-pre-line">{{ blog.content }}</div>
</article>

<a href="{% url 'blog_list' %}" class="inline-block mt-6 text-sm font-medium text-blue-600 hover:underline">
    ← Back to all posts
</a>
{% endblock %}
