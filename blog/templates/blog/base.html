<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <header class="bg-white  border-b border-gray-200">
        <div class="max-w-3xl flex justify-between mx-auto px-4 py-6">
            <a href="{% url 'blog_list' %}" class="text-2xl font-bold text-gray-900 hover:text-blue-600">My Blog</a>
            <a href="{% url 'blog_list' %}" class="text-2xl font-bold text-red-500 hover:text-blue-600">logout</a>
        </div>
    </header>
    <div class="flex">
        <!-- sidebar -->
         <div class="bg-sky-500 w-1/4 min">this is sidebar </div>
        <main class="max-w-3xl mx-auto px-4 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
